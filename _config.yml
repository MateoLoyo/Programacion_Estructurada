# Configuración Jekyll para GitHub Pages
title: "Programación Estructurada"
description: "Repositorio de actividades y evidencias - Lenguaje C"
author: "Mateo Loyo Martinez"
theme: minima

# Configuración del tema Minima
minima:
  skin: classic

# Navegación - Solo el README principal aparece en el menú superior
header_pages:
  - README.md

# IMPORTANTE: Configurar Jekyll para que use READMEs como índices
# Esto permite que README_actividad_XX.md funcione como página principal
defaults:
  - scope:
      path: "Actividad_01_Tipos_Datos"
      type: "pages"
    values:
      layout: "default"
      permalink: "/Actividad_01_Tipos_Datos/"
