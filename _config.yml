# --- Configuración básica ---
title: "Portafolio Programación Estructurada"
description: "Portafolio de evidencias - Programación Estructurada en C"
author: "Mateo Loyo Martinez"

# --- Tema (opcional, comenta si da problemas) ---
# theme: minima

# --- Build settings ---
markdown: kramdown
highlighter: rouge

# --- CRÍTICO: Incluir carpetas que Jekyll ignora por defecto ---
# Jekyll ignora carpetas con _, ., # o carpetas en node_modules/vendor
# Las actividades NO empiezan con _, pero por seguridad las incluimos:
include:
  - Actividad_01_Tipos_Datos
  - Actividad_02_Operadores
  - Actividad_03_Condicionales
  - Actividad_04_Ciclos
  - Actividad_05_Funciones
  - Actividad_06_Arreglos
  - Actividad_07_Matrices
  - Actividad_08_Punteros
  - Actividad_09_Recursion
  - Actividad_10_Cadenas
  - Actividad_11_Estructuras
  - Actividad_12_Archivos
  - Actividad_Extra_BattleShip

# --- Excluir archivos innecesarios ---
exclude:
  - README.md
  - .github/
  - Gemfile
  - Gemfile.lock

# --- Seguridad: desactivar plugins no soportados ---
plugins: []

